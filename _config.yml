description: "Hi, I’m Andrea. I’m a data scientist focused on decision-making in complex operational systems. I bring a background in industrial production, education analytics, and process optimization, and I specialize in turning messy, real-world processes into clear, data-driven decisions. My work blends Lean thinking, analytics, and machine learning to diagnose bottlenecks, quality issues, and process variability, and to design systems that improve flow, reliability, and performance. Across manufacturing, supply chain, energy, and education contexts, I focus on building analytics that go beyond reporting and actively support practical, high-impact operational decisions."
